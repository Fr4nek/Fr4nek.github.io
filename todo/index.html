<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AppName — macOS App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #F2F2F7;
      --surface:   #FFFFFF;
      --border:    rgba(60,60,67,0.12);
      --accent:    #007AFF;
      --accent2:   #5AC8FA;
      --text:      #1C1C1E;
      --muted:     #6C6C70;
      --glow:      rgba(0,122,255,0.18);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      overflow-x: hidden;
    }

    /* ── NOISE OVERLAY ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.025'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 0 7vw;
      gap: 5vw;
      z-index: 1;
    }

    /* radial glow behind the window */
    .hero::after {
      content: '';
      position: absolute;
      right: 5%;
      top: 50%;
      transform: translateY(-50%);
      width: 55vw;
      height: 70vh;
      background: radial-gradient(ellipse at center, var(--glow) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── LEFT ── */
    .left {
      flex: 0 0 auto;
      width: min(380px, 38vw);
      display: flex;
      flex-direction: column;
      gap: 28px;
      z-index: 2;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent2);
    }
    .eyebrow span.dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent2);
      box-shadow: 0 0 8px var(--accent2);
    }

    h1 {
      font-size: clamp(2rem, 4vw, 3.2rem);
      font-weight: 700;
      line-height: 1.12;
      letter-spacing: -0.03em;
      color: var(--text);
    }
    h1 em {
      font-style: normal;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 15px;
      font-weight: 400;
      line-height: 1.65;
      color: var(--muted);
      max-width: 320px;
    }

    /* ── BUTTONS ── */
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 4px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 13px 24px;
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      border: none;
    }
    .btn:hover  { transform: translateY(-2px); }
    .btn:active { transform: translateY(0); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 20px rgba(0,122,255,0.35);
    }
    .btn-primary:hover {
      background: #0071eb;
      box-shadow: 0 6px 28px rgba(0,122,255,0.5);
    }

    .btn-ghost {
      background: rgba(255,255,255,0.7);
      color: var(--text);
      border: 1px solid var(--border);
      backdrop-filter: blur(12px);
    }
    .btn-ghost:hover {
      background: rgba(255,255,255,0.9);
      border-color: rgba(60,60,67,0.22);
    }

    .btn svg {
      flex-shrink: 0;
    }

    .version-note {
      font-size: 11.5px;
      color: var(--muted);
      opacity: 0.6;
    }

    /* ── RIGHT — macOS WINDOW ── */
    .right {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 2;
    }

    .mac-window {
      width: 100%;
      max-width: 760px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.06),
        0 40px 80px rgba(0,0,0,0.14),
        0 8px 24px rgba(0,0,0,0.08);
      background: var(--surface);
      transition: transform 0.4s ease;
    }
    .mac-window:hover {
      transform: scale(1.012) translateY(-4px);
    }

    /* title bar */
    .titlebar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px;
      background: #F5F5F5;
      border-bottom: 1px solid var(--border);
      user-select: none;
    }
    .traffic { display: flex; gap: 7px; }
    .tl {
      width: 12px; height: 12px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .tl-close  { background: #FF5F57; }
    .tl-min    { background: #FFBD2E; }
    .tl-max    { background: #28C840; }

    .titlebar-label {
      flex: 1;
      text-align: center;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.01em;
      margin-right: 37px; /* optical center */
    }

    /* screenshot area */
    .screenshot {
      width: 100%;
      aspect-ratio: 16 / 10;
      background:
        linear-gradient(135deg, #EBF4FF 0%, #F0F7FF 50%, #EEF2FF 100%);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* ─── placeholder UI inside the mock window ─── */
    .mock-sidebar {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 200px;
      background: rgba(242,242,247,0.8);
      border-right: 1px solid rgba(60,60,67,0.1);
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .mock-sidebar-item {
      height: 28px;
      border-radius: 6px;
      background: rgba(60,60,67,0.08);
    }
    .mock-sidebar-item.active {
      background: rgba(0,122,255,0.15);
    }
    .mock-sidebar-item:first-child { width: 70%; margin-bottom: 8px; background: rgba(60,60,67,0.15); }

    .mock-main {
      position: absolute;
      left: 200px; right: 0; top: 0; bottom: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .mock-row {
      height: 14px;
      border-radius: 4px;
      background: rgba(60,60,67,0.1);
    }
    .mock-row.short  { width: 45%; }
    .mock-row.medium { width: 70%; }
    .mock-row.long   { width: 90%; }
    .mock-row.title  { height: 20px; width: 55%; background: rgba(60,60,67,0.2); margin-bottom: 4px; }

    .mock-card-row {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }
    .mock-card {
      flex: 1;
      height: 80px;
      border-radius: 8px;
      background: rgba(255,255,255,0.85);
      border: 1px solid rgba(60,60,67,0.1);
      position: relative;
      overflow: hidden;
    }
    .mock-card::after {
      content: '';
      position: absolute;
      bottom: 8px; left: 12px;
      width: 50%; height: 8px;
      border-radius: 3px;
      background: rgba(0,122,255,0.35);
    }

    .mock-accent-bar {
      position: absolute;
      top: 20px; right: 20px;
      width: 90px; height: 30px;
      border-radius: 6px;
      background: var(--accent);
      opacity: 0.8;
    }

    /* ── FOOTER STRIP ── */
    .footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 28px;
      font-size: 12px;
      color: var(--muted);
      opacity: 0.4;
      border-top: 1px solid var(--border);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 860px) {
      .hero {
        flex-direction: column;
        padding: 60px 6vw 40px;
        gap: 40px;
        min-height: unset;
      }
      .hero::after { display: none; }
      .left { width: 100%; align-items: center; text-align: center; }
      .subtitle { max-width: 100%; }
      .buttons { align-items: stretch; }
      .right { width: 100%; }
      h1 { font-size: clamp(1.8rem, 7vw, 2.8rem); }
    }

    @media (prefers-reduced-motion: reduce) {
      .mac-window { transition: none; }
      .btn       { transition: none; }
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="left">
      <span class="eyebrow"><span class="dot"></span>Native macOS App</span>

      <h1>Your App.<br /><em>Supercharged.</em></h1>

      <p class="subtitle">
        Wstaw tutaj krótki opis swojej aplikacji — co robi, komu służy i dlaczego warto ją mieć.
      </p>

      <div class="buttons">
        <a href="#" class="btn btn-primary">
          <!-- Apple icon -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">

        <a href="https://github.com/" target="_blank" rel="noopener" class="btn btn-ghost">

          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">

          </svg>
          View on GitHub
        </a>
      </div>

      <span class="version-note">macOS 13 Ventura or later · Apple Silicon & Intel</span>
    </div>

    <div class="right">
      <div class="mac-window">
        <img src="screen_light.png" alt="AppName screenshot" style="width:100%;height:auto;display:block;" />
      </div>
    </div>
  </section>

  <footer class="footer">
    © 2026 AppName · Built with ♥ on macOS
  </footer>

</body>
</html>
